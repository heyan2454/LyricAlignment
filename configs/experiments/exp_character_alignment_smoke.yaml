experiment_id: exp_character_alignment_smoke
stage: future_metric_baseline
status: deferred_until_character_ground_truth_and_metric_are_ready
do_not_run_in_current_asset_smoke_stage: true
manifest: data/manifests/manifest_alignment.template.csv

task: oracle_lyrics_alignment
primary_language: zh
primary_level: character

methods:
  - method_id: qwen_fa_vocal_raw
    input_audio: vocal
    aligner: qwen_forced_aligner
    adapter: null

metrics_config: configs/metrics/token_alignment_metrics.yaml

dataset_scope:
  development:
    - opencpop_train_holdout
    - m4singer_holdout
  final_test_sealed:
    - opencpop_official_test
    - mir1k_character_vocal
    - mir1k_character_mix

output_policy:
  overwrite_existing_run: false
  save_external_raw_model_response: true
  save_config_snapshot: true
  save_environment_snapshot: true

notes:
  - This is not the current no-metric raw smoke config.
  - Activate only after character GT conversion, split freezing, and metric validation.
