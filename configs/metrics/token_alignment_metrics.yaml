level_by_language:
  zh: character

token_mapping: explicit_sequence_mapping
# 50 ms is retained as a strict auxiliary threshold. The model timestamp grid
# must be verified from the actual model revision before freezing primary thresholds.
tolerances_seconds: [0.05, 0.08, 0.16, 0.24]
near_zero_duration_threshold_seconds: to_verify

aggregation:
  - pooled_micro
  - per_song_macro
  - per_song_results

metrics:
  - start_signed_error
  - start_abs_error
  - end_signed_error
  - end_abs_error
  - onset_within_tolerance
  - offset_within_tolerance
  - joint_within_tolerance
  - token_coverage
  - missing_token_count
  - extra_token_count
  - token_mapping_failure_count
  - monotonic_violation_count
  - negative_duration_count
  - near_zero_duration_count
  - drift_front_back_delta
  - drift_slope

confidence_interval:
  method: song_level_bootstrap
  status: to_implement
