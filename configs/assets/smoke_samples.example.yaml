schema_version: 2
status: template_only

model:
  model_id_or_path: Qwen/Qwen3-ForcedAligner-0.6B-hf
  revision: c07281df297b9905d24a508279258cccf987a064
  device: cuda
  dtype: bfloat16
language: Chinese

output_dir: ${LYRICALIGN_OUTPUT_ROOT}/smoke/qwen_forced_aligner
run_index_dir: runs/smoke
skip_existing_success: true
overwrite: false

executables:
  ffmpeg: ffmpeg

# Current inference can decode multiple formats through ffmpeg, but the future
# curated dataset will normalize model inputs during data cleaning.
audio_contract:
  future_curated_format: wav
  channels: 1
  sample_rate_hz: 16000
  sample_encoding: pcm_s16le_or_documented_equivalent
  enforcement_stage: data_cleaning

validation:
  compare_non_whitespace_character_count: true
  timestamp_range_early_tolerance_sec: 0.25
  timestamp_range_late_tolerance_sec: 0.5

samples:
  - sample_id: official_example_001
    dataset: official_example
    audio_path: to_fill
    text: to_fill
    text_source: official_example
    audio_source: raw

  - sample_id: m4singer_smoke_001
    dataset: m4singer
    audio_path: to_fill_after_asset_discovery
    text: to_fill_from_existing_reliable_lyrics
    text_source: m4singer_meta_json_txt
    audio_source: raw
    expected_item_count: null

forbidden_in_this_stage:
  - metric_computation
  - ground_truth_comparison
  - threshold_tuning
  - phoneme_to_character_conversion
  - character_boundary_derivation
  - synthetic_long_audio_generation
