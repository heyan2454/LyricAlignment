schema_version: 1
status: template_only

roots:
  ast_project_root: ${AST_PROJECT_ROOT}
  shared_dataset_root: ${LYRICALIGN_SHARED_DATA_ROOT}
  model_cache_root: ${LYRICALIGN_MODEL_CACHE_ROOT}
  output_root: ${LYRICALIGN_OUTPUT_ROOT}

models:
  qwen_forced_aligner:
    preferred_model_id: Qwen/Qwen3-ForcedAligner-0.6B-hf
    preferred_source_url: https://huggingface.co/Qwen/Qwen3-ForcedAligner-0.6B-hf
    reference_model_id: Qwen/Qwen3-ForcedAligner-0.6B
    reference_source_url: https://huggingface.co/Qwen/Qwen3-ForcedAligner-0.6B
    download_reference_model_by_default: false
    revision: c07281df297b9905d24a508279258cccf987a064
    local_path: to_set_in_local_config
    status: downloaded_and_short_smoke_reported_server_side

datasets:
  opencpop:
    role: future_train_and_in_domain_test
    acquisition: download_official_source
    root: ${OPENCPOP_ROOT}
    status: pending

  m4singer:
    role: future_train_and_development
    acquisition: discover_ast_first_then_reuse_or_transfer
    ast_candidate_root: ${AST_M4SINGER_ROOT}
    shared_candidate_root: ${M4SINGER_ROOT}
    access_mode: read_only
    user_reported_local_download: true
    user_reported_ast_copy: true
    status: shared_path_verified_read_only

  mir1k:
    role: future_ood_evaluation
    acquisition: discover_ast_and_reuse
    ast_candidate_root: ${AST_MIR1K_ROOT}
    shared_candidate_root: ${MIR1K_ROOT}
    access_mode: read_only
    user_reported_ast_copy: true
    status: path_and_audio_text_mapping_to_verify

policies:
  reuse_order:
    - direct_read_only_reference
    - external_symlink
    - shared_external_copy_only_when_required
  never_copy_into_git_repository: true
  never_modify_ast_dataset_in_place: true
  verify_before_transfer: true
