curation_id: curation_v1
status: design_only

states:
  - accepted
  - review_required
  - rejected

hard_failures:
  - missing_file
  - decode_failure
  - empty_lyrics

soft_flags:
  - suspicious_duration
  - high_silence_ratio
  - possible_duplicate
  - possible_split_leakage
  - possible_lyrics_mismatch
  - low_alignment_coverage
  - token_mapping_failure

policy:
  raw_aligner_failure_can_auto_reject: false
  preserve_original_files: true
  preserve_original_lyrics: true
  require_rule_version_in_output: true

thresholds:
  status: to_verify_from_data_distribution
